# Tiny config with RMSNorm instead of LayerNorm.
# Single-variable ablation against tiny.yaml baseline.

model:
  d_model: 256
  num_layers: 4
  num_heads: 4
  d_ff: 1024
  max_seq_len: 512
  dropout: 0.1
  attention_type: "mha"
  num_kv_heads: null
  pos_encoding_type: "sinusoidal"
  norm_type: "rmsnorm"
  norm_position: "pre"
  ffn_type: "standard"
  activation: "gelu"

data:
  data_path: "data/processed/tinystories_tiny"
  tokenizer_path: "references/tokenizers/english_bytebpe_8k.json"
  split_ratio: [0.995, 0.005, 0.0]
  split_seed: 42
  add_special_tokens: false

training:
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 0.01
  num_epochs: 1
  seed: 42
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1
  scheduler_type: "warmup_cosine"
  warmup_steps: 200
  use_amp: false
  log_interval: 20
  checkpoint_dir: "models/tiny_rmsnorm"
  num_workers: 0
